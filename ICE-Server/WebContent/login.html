<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="./css/create_account.css">
    <script type="text/javascript" src="./js/argon2-bundled.min.js"></script>
    <script type="text/javascript" src="./js/crypto-js.min.js"></script>
    <script type="text/javascript" src="./js/aux.js"></script>
    <script type="text/javascript" src="./js/login.js"></script>
</head>
<body>

<div class="card">
    <h1>Login</h1>

    <form id="loginForm" onsubmit="return false;" style="display:flex;flex-direction:column;gap:0.7rem;">
        <input id="username" type="text" placeholder="Username" autocomplete="username" />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />

        <button id="login" type="submit">Login</button>
    </form>

    <div id="StatusMessage" class="statusMessage"></div>
</div>

</body>
</html>
