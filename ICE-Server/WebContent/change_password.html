<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Change Password</title>
    <link rel="stylesheet" type="text/css" href="css/create_account.css">
    <link rel="stylesheet" type="text/css" href="css/aux.css">
    <script type="text/javascript" src="js/argon2-bundled.min.js"></script>
    <script type="text/javascript" src="js/openpgp.min.js"></script>
    <script type="text/javascript" src="js/aux.js"></script>
    <script type="text/javascript" src="js/change_password.js"></script>
</head>
<body>

<div class="card">
    <h1>Change Password</h1>

    <input id="currentPassword" type="password" placeholder="Current Password" autocomplete="current-password" />
    <input id="newPassword"     type="password" placeholder="New Password"     autocomplete="new-password" />
    <input id="newPassword2"    type="password" placeholder="Confirm New Password" autocomplete="new-password" />

    <button id="submit">Change Password</button>

    <div id="StatusMessage" class="statusMessage"></div>

    <a href="web/index.html" style="display:inline-block;margin-top:1rem;color:#007bff;text-decoration:none;">&larr; Back</a>
</div>

</body>
</html>
