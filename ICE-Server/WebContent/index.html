<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ICEMail</title>
    <link rel="stylesheet" type="text/css" href="./css/create_account.css">
    <style>
        .card { max-width: 420px; text-align: center; gap: 1rem; }
        h1 { margin: 0 0 0.2rem 0; font-size: 2rem; color: #1a1a2e; }
        .subtitle { margin: 0 0 0.5rem 0; font-size: 0.95rem; color: #555; }
        .notice {
            font-size: 0.85rem;
            color: #856404;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 0.6rem 0.8rem;
        }
        .divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 0.2rem 0;
        }
        .btn-secondary {
            background: white;
            color: #007bff;
            border: 1px solid #007bff;
        }
        .btn-secondary:hover { background: #f0f6ff; }
        .build-info {
            font-size: 0.78rem;
            color: #888;
            text-align: center;
            margin-top: 0.2rem;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            margin-top: 0.6rem;
            font-size: 0.82rem;
            color: #888;
        }
        .footer-links a {
            color: #555;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .footer-links a:hover { color: #1a1a2e; }
    </style>
</head>
<body>

<div class="card">
    <h1>ICEMail</h1>
    <p class="subtitle">Self-hosted end-to-end encrypted mail</p>

    <div class="notice">
        This is a test site for the ICEMail service.<br>
        All messages are end-to-end encrypted — the server never has access to your keys or plaintext mail.
    </div>

    <hr class="divider">

    <a href="./login.html" style="text-decoration:none;">
        <button type="button">Login</button>
    </a>

    <a href="./create_account.html" style="text-decoration:none;">
        <button type="button" class="btn-secondary">Create Account</button>
    </a>

    <hr class="divider">

    <a href="./aes-tool.html" style="text-decoration:none;">
        <button type="button" class="btn-secondary">AES-256 Encrypt / Decrypt</button>
    </a>

    <div class="build-info" id="buildInfo"></div>

    <div class="footer-links">
        <a href="https://github.com/hoddmimes/ICEMail" target="_blank" rel="noopener">
            <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                         0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                         -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                         .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                         -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                         .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                         .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                         0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
        </a>
        <span id="visitorCount"></span>
    </div>
</div>

<script>
    fetch('./build-info.json')
        .then(r => r.ok ? r.json() : null)
        .then(info => {
            if (info) {
                document.getElementById('buildInfo').textContent =
                    'Deployed ' + info.deployedAt + '  \u2022  ' + info.gitBranch + '@' + info.gitCommit;
            }
        })
        .catch(() => {});

    fetch('./visitor-count')
        .then(r => r.ok ? r.json() : null)
        .then(data => {
            if (data && data.count !== undefined) {
                document.getElementById('visitorCount').textContent = '\u2022 Visitors: ' + data.count.toLocaleString();
            }
        })
        .catch(() => {});
</script>

</body>
</html>
